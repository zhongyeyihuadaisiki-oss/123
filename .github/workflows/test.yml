name: Wuthering Waves Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟巡逻一次
  workflow_dispatch:      # 允许手动运行

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 必须开启，否则无法保存监控状态

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run logic
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python test_monitor.py

      - name: Save State
        run: |
          git config --global user.name "Bot"
          git config --global user.email "bot@github.com"
          # 检查：确保这里的文件名和 Python 脚本里 STATUS_FILE 定义的一致
          # 建议统一使用 last_event_count.txt
          touch last_event_count.txt 
          git add last_event_count.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update state" && git push)
